const logEl = document.getElementById('log');
function log(msg, level='info') {
  const t = new Date().toLocaleTimeString();
  const line = document.createElement('div');
  line.className = 'l-' + level;
  line.textContent = `[${t}] ${msg}`;

  if (level==='err') console.error(msg); else console.log(msg);
}

  return import(url);
}

async function loadThree() {
  for (const base of CDNS) {
    try {
      const three = await tryImport(`${base}/build/three.module.js`);
      const gltf = await tryImport(`${base}/examples/jsm/loaders/GLTFLoader.js`);
      const orbit = await tryImport(`${base}/examples/jsm/controls/OrbitControls.js`);
      log('three.js 로드 완료 (' + base.replace('https://','').split('/')[0] + ')', 'ok');
      return { THREE: three, GLTFLoader: gltf.GLTFLoader, OrbitControls: orbit.OrbitControls };
    } catch (e) {
      log('실패: ' + e.message, 'err');
    }
  }
  throw new Error('모든 CDN 차단 — 사내 방화벽 확인 또는 localhost:3000/poc/ 경로 사용');
}

// ============ glTF base64 → ArrayBuffer =============
function decodeB64ToBuffer(b64) {
  const bin = atob(b64);
  const len = bin.length;
  const u8 = new Uint8Array(len);
  for (let i = 0; i < len; i++) u8[i] = bin.charCodeAt(i);
  return u8.buffer;
}

// ============ 메인 =============
(async () => {
  let THREE, GLTFLoader, OrbitControls;
  try {
    ({ THREE, GLTFLoader, OrbitControls } = await loadThree());
  } catch (e) {
    document.getElementById('stats').textContent = 'CDN 로드 실패';
    log(e.message, 'err');
    return;
  }

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0e1a);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.getElementById('app').appendChild(renderer.domElement);

  const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 1, 100000);
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.08;

  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const d1 = new THREE.DirectionalLight(0xffffff, 0.9);
  d1.position.set(2000, 3000, 1000); scene.add(d1);
  const d2 = new THREE.DirectionalLight(0xa0c8ff, 0.4);
  d2.position.set(-1500, 2000, -1000); scene.add(d2);

  const layerGroup = new THREE.Group();
  scene.add(layerGroup);
  // 회전 보정 없음 — trimesh export가 이미 Y-up 변환

  let vexag = 3;
  function applyExag() { layerGroup.scale.set(1, vexag, 1); }
  applyExag();

  // base64 → ArrayBuffer → parse()
  log('glTF base64 디코딩 중...');
  const b64 = document.getElementById('glb-data').textContent.trim();
  log(`base64 크기: ${(b64.length/1024).toFixed(0)} KB`);
  const buffer = decodeB64ToBuffer(b64);
  log(`ArrayBuffer 크기: ${(buffer.byteLength/1024).toFixed(0)} KB`);

  const loader = new GLTFLoader();
  const allMeshes = [];

  loader.parse(buffer, '', (gltf) => {
    log('glTF parse 성공', 'ok');
    gltf.scene.traverse((obj) => {
      if (obj.isMesh) {
        obj.material = new THREE.MeshStandardMaterial({
          vertexColors: true, metalness: 0.1, roughness: 0.85,
          side: THREE.DoubleSide,
        });
        allMeshes.push(obj);
      }
    });
    layerGroup.add(gltf.scene);
    log(`mesh ${allMeshes.length}개 등록`, 'ok');

    buildLegend();
    fitCamera();
    const triCount = allMeshes.reduce((s,m) => s + (m.geometry?.index?.count || 0)/3, 0);
    document.getElementById('stats').innerHTML =
      `meshes: ${allMeshes.length} · triangles: ${triCount.toLocaleString()}`;
  }, (err) => {
    log('glTF parse 실패: ' + (err.message || err), 'err');
    document.getElementById('stats').textContent = 'glTF parse 실패';
  });

  function buildLegend() {
    const legend = document.getElementById('legend');
    legend.innerHTML = '';
    const items = [
      {name:'TOPSOIL',  label:'토사',   color:'#8B7355'},
      {name:'WEATHERED',label:'풍화암', color:'#C4A57B'},
      {name:'SOFT_ROCK',label:'연암',   color:'#6B8E5A'},
      {name:'HARD_ROCK',label:'경암',   color:'#3D3D3D'},
    ];
    items.forEach((it, i) => {
      const row = document.createElement('div');
      row.className = 'legend-row';
      row.innerHTML = `<span class="swatch" style="background:${it.color}"></span>${it.label}`;
      row.onclick = () => {
        row.classList.toggle('off');
        if (allMeshes[i]) allMeshes[i].visible = !row.classList.contains('off');
      };
      legend.appendChild(row);
    });
  }

  function fitCamera() {
    const box = new THREE.Box3().setFromObject(layerGroup);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    log(`bbox: x ${size.x.toFixed(0)} · y ${size.y.toFixed(0)} · z ${size.z.toFixed(0)}`);
    controls.target.copy(center);
    camera.position.set(
      center.x + maxDim * 0.9,
      center.y + maxDim * 0.5,
      center.z + maxDim * 0.9
    );
    controls.update();
  }

  document.getElementById('vexag').oninput = (e) => {
    vexag = +e.target.value;
    document.getElementById('vlabel').textContent = vexag + '×';
    applyExag();
  };
  let autoRot = 0;
  document.getElementById('autoRot').oninput = (e) => {
    autoRot = +e.target.value;
    document.getElementById('rlabel').textContent = autoRot.toFixed(1) + '°/s';
  };
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    if (autoRot > 0) layerGroup.rotation.y += autoRot * 0.01;
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
  log('렌더링 시작', 'ok');
})();
</script>
</body>
</html>
